<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Exclusivo - Concesionario Premium</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* =========================================
           ESTILOS BASE PREMIUM
           ========================================= */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
            color: #111111;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* =========================================
           CABECERA (HEADER)
           ========================================= */
        .header {
            background-color: #000000;
            color: #ffffff;
            padding: 60px 20px;
            text-align: center;
            border-bottom: 4px solid #cc0000;
        }

        .header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .trust-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #aaaaaa;
            background: rgba(255,255,255,0.1);
            padding: 6px 16px;
            border-radius: 20px;
            margin-top: 10px;
        }

        /* =========================================
           CUADRÍCULA DE COCHES (GRID)
           ========================================= */
        .container {
            max-width: 1300px;
            margin: 0 auto;
            padding: 50px 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .card {
            background-color: #ffffff;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #eaeaea;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.08);
            border-color: #dddddd;
        }

        /* Contenedor de imagen 3:2 panorámico */
        .img-container {
            width: 100%;
            aspect-ratio: 3 / 2;
            background-color: #eeeeee;
            position: relative;
            overflow: hidden;
        }

        .car-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .car-image {
            transform: scale(1.05);
        }

        /* Detalles del coche */
        .info {
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .title {
            font-size: 1.25rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 15px;
            line-height: 1.3;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .spec-item {
            font-size: 0.85rem;
            color: #555555;
            display: flex;
            align-items: center;
            gap: 8px;
            background: #f4f4f4;
            padding: 8px 10px;
            border-radius: 4px;
            font-weight: 600;
        }

        .spec-item i {
            color: #cc0000;
            width: 14px;
            text-align: center;
        }

        .btn {
            margin-top: auto;
            display: block;
            width: 100%;
            padding: 14px;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 4px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.3s ease;
        }

        .btn:hover {
            background-color: #cc0000;
        }

        /* =========================================
           VENTANA EMERGENTE (MODAL)
           ========================================= */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.open {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 8px;
            width: 90%;
            max-width: 450px;
            position: relative;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: translateY(20px);
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal.open .modal-content {
            transform: translateY(0);
        }

        .close {
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            font-size: 1.5rem;
            color: #aaaaaa;
            transition: color 0.3s;
            background: none;
            border: none;
        }

        .close:hover { color: #000000; }

        /* Formulario */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #333333;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 700;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background-color: #f9f9f9;
            border: 1px solid #e0e0e0;
            color: #111111;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #000000;
            background-color: #ffffff;
        }

        /* =========================================
           ANIMACIÓN DE ÉXITO
           ========================================= */
        .success-container {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 0;
            text-align: center;
        }

        .success-icon {
            width: 70px;
            height: 70px;
            background-color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            color: white;
            font-size: 30px;
        }

        /* =========================================
           RESPONSIVE MÓVIL
           ========================================= */
        @media (max-width: 768px) {
            .header { padding: 40px 20px; }
            .header h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr; }
            .modal-content { padding: 30px 20px; }
        }

    </style>
</head>
<body>

    <header class="header">
        <h1>Vehículos de Ocasión Premium</h1>
        <div class="trust-badge">
            <i class="fa-solid fa-shield-check"></i> Garantía y verificación por el cliente
        </div>
    </header>

    <div class="container">
        <div class="grid" id="car-grid">
            </div>
    </div>

    <div class="modal" id="form-modal">
        <div class="modal-content">
            <button class="close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            
            <div id="form-container">
                <h2 style="margin-top:0; color:#000; font-size: 1.4rem; text-transform:uppercase; font-weight:800;">Solicitar Información</h2>
                <p id="car-selected-text" style="color:#666; font-size:0.9rem; margin-bottom: 25px; border-left: 3px solid #cc0000; padding-left: 10px;"></p>
                
                <form id="lead-form">
                    <input type="hidden" id="hidden_referencia" name="referencia">
                    <input type="hidden" id="hidden_modelo" name="modelo">

                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre" required placeholder="Ej: Juan Pérez">
                    </div>
                    <div class="form-group">
                        <label>Teléfono Móvil</label>
                        <input type="tel" id="telefono" required placeholder="+34 600 000 000">
                    </div>
                    <div class="form-group">
                        <label>correo electrónico</label>
                        <input type="email" id="correo" required placeholder="tu@email.com">
                    </div>
                    <div class="form-group">
                        <label>¿Entregas coche a cambio?</label>
                        <select id="coche_cambio">
                            <option value="No">No</option>
                            <option value="Sí">Sí</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Método de pago preferido</label>
                        <select id="tipo_pago">
                            <option value="Financiación">Financiación</option>
                            <option value="Contado">Al Contado</option>
                        </select>
                    </div>
                    <button type="submit" class="btn" style="margin-top:10px;">Enviar Solicitud</button>
                </form>
            </div>

            <div id="success-container" class="success-container">
                <div class="success-icon"><i class="fa-solid fa-check"></i></div>
                <h3 style="font-size: 1.4rem; font-weight: 800; color: #000; margin-bottom: 10px;">¡Solicitud Registrada!</h3>
                <p style="color: #666; font-size: 0.95rem;">El equipo de ventas contactará contigo en breve para informarte sobre este vehículo.</p>
            </div>
        </div>
    </div>

    <script>
        // Base de datos restaurada con tus rutas originales
        const coches = [
            { ref: "REF-001", nombre: "Porsche 911 Carrera", km: "15.000", motor: "3.0 V6", cv: "385", trans: "PDK", img: "img/porsche-911.jpg" },
            { ref: "REF-002", nombre: "Mercedes CLA 45 AMG", km: "22.000", motor: "2.0 L4", cv: "421", trans: "Automático", img: "img/mercedes-cla.jpg" },
            { ref: "REF-003", nombre: "Audi RS Q8", km: "35.000", motor: "4.0 V8", cv: "600", trans: "Tiptronic", img: "img/audi-rsq8.jpg" },
            { ref: "REF-004", nombre: "BMW M4 Competition", km: "18.000", motor: "3.0 L6", cv: "510", trans: "Steptronic", img: "img/bmw-m4.jpg" },
            { ref: "REF-005", nombre: "Range Rover Velar", km: "50.000", motor: "2.0 L4", cv: "250", trans: "Automático", img: "img/rangerover-velar.jpg" },
            { ref: "REF-006", nombre: "Lexus LC 500", km: "28.000", motor: "5.0 V8", cv: "477", trans: "Automático", img: "img/lexus-lc500.jpg" },
            { ref: "REF-007", nombre: "Alfa Romeo Giulia QV", km: "40.000", motor: "2.9 V6", cv: "510", trans: "Automático", img: "img/alfa-giulia.jpg" },
            { ref: "REF-008", nombre: "Porsche Macan S", km: "60.000", motor: "3.0 V6", cv: "380", trans: "PDK", img: "img/porsche-macan.jpg" }
        ];

        // Renderizar la cuadrícula
        const grid = document.getElementById('car-grid');
        
        coches.forEach(coche => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="img-container">
                    <img src="${coche.img}" alt="${coche.nombre}" class="car-image" onerror="this.parentElement.style.backgroundColor='#eaeaea'; this.style.display='none'; this.parentElement.innerHTML+='<div style=position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#888;font-size:0.9rem;><i class=\\'fa-solid fa-image\\'></i> Foto pendiente</div>';">
                </div>
                <div class="info">
                    <div class="title">${coche.nombre}</div>
                    <div class="specs-grid">
                        <div class="spec-item"><i class="fa-solid fa-gauge-high"></i> ${coche.cv} CV</div>
                        <div class="spec-item"><i class="fa-solid fa-road"></i> ${coche.km} km</div>
                        <div class="spec-item"><i class="fa-solid fa-gear"></i> ${coche.trans}</div>
                        <div class="spec-item"><i class="fa-solid fa-engine"></i> ${coche.motor}</div>
                    </div>
                    <button class="btn" onclick="openModal('${coche.ref}', '${coche.nombre}')">Solicitar Información</button>
                </div>
            `;
            grid.appendChild(card);
        });

        // Lógica Modal
        const modal = document.getElementById('form-modal');
        const formContainer = document.getElementById('form-container');
        const successContainer = document.getElementById('success-container');

        function openModal(ref, nombre) {
            document.getElementById('hidden_referencia').value = ref;
            document.getElementById('hidden_modelo').value = nombre;
            document.getElementById('car-selected-text').innerHTML = `<strong>${nombre}</strong>`;
            
            formContainer.style.display = 'block';
            successContainer.style.display = 'none';
            
            modal.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modal.classList.remove('open');
            document.body.style.overflow = 'auto';
            setTimeout(() => document.getElementById('lead-form').reset(), 300);
        }

        // Cierra al hacer clic fuera del modal
        modal.addEventListener('click', function(e) {
            if (e.target === modal) closeModal();
        });

        // Envío a n8n
        document.getElementById('lead-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const btn = this.querySelector('.btn');
            const textoOriginal = btn.innerText;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Procesando...';
            btn.disabled = true;
            
            const payload = {
                referencia: document.getElementById('hidden_referencia').value,
                modelo: document.getElementById('hidden_modelo').value,
                nombre: document.getElementById('nombre').value,
                telefono: document.getElementById('telefono').value,
                correo_electronico: document.getElementById('correo').value,
                coche_cambio: document.getElementById('coche_cambio').value,
                tipo_pago: document.getElementById('tipo_pago').value
            };

            fetch('https://yerayagency.app.n8n.cloud/webhook-test/b572f76b-685c-4387-a946-33bcd320747a', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if(response.ok) {
                    formContainer.style.display = 'none';
                    successContainer.style.display = 'flex';
                    setTimeout(() => closeModal(), 3000);
                } else {
                    alert("⚠️ Error de conexión con el sistema.");
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert("Hubo un problema de red.");
            })
            .finally(() => {
                btn.innerHTML = textoOriginal;
                btn.disabled = false;
            });
        });
    </script>
</body>
</html>
